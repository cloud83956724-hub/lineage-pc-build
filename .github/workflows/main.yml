name: Build LineageOS 15.1 PC (GitHub Native Final Solution)

on:
  workflow_dispatch:

env:
  ROM_URL: "https://github.com/android-x86/manifest"
  DEVICE_NAME: "android_x86_64"

jobs:
  build:
    runs-on: ubuntu-22.04 

    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Free Disk Space
      run: |
        sudo docker image prune --all --force
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        df -h

    - name: Install Android Build Dependencies (Ubuntu 22.04 Strict)
      run: |
        sudo apt-get update
        sudo apt-get install -y git-core gnupg flex bison gperf build-essential zip curl zlib1g-dev \
          gcc-multilib g++-multilib libc6-dev-i386 x11proto-core-dev \
          libx11-dev lib32z1-dev ccache libgl1-mesa-dev libxml2-utils xsltproc unzip mtools \
          u-boot-tools scons dkms bc squashfs-tools

    - name: Install Repo Tool
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/local/bin/repo

    - name: Configure Git Identity
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"

    - name: Initialize and Patch Manifest
      run: |
        mkdir -p android-x86
        cd android-x86
        
        # Sử dụng kho chuẩn xác nhất của android-x86, không chỉ định nhánh để lấy nhánh mặc định ổn định nhất (thường là oreo-x86 hoặc tương đương)
        python3 /usr/local/bin/repo init -u ${{ env.ROM_URL }} --no-clone-bundle --depth=1
        
        echo "=== Bắt đầu vá Manifest lỗi link remote ==="
        # Chuyển đổi các fetch url tương đối hoặc bị sập sang url tuyệt đối an toàn
        if [ -f ".repo/manifests/default.xml" ]; then
          # Thay thế các remote gốc của android-x86 về github chính thức
          sed -i 's|fetch=".."|fetch="https://github.com/android-x86"|g' .repo/manifests/default.xml
          sed -i 's|fetch="android-x86"|fetch="https://github.com/android-x86"|g' .repo/manifests/default.xml
          # Sửa các remote của CyanogenMod/LineageOS cũ nếu có về Git chính thức hiện tại
          sed -i 's|fetch="https://github.com/CyanogenMod"|fetch="https://github.com/LineageOS"|g' .repo/manifests/default.xml
          echo "Đã vá xong file default.xml"
        fi

    - name: Sync Source Code
      run: |
        cd android-x86
        # Đồng bộ hóa với số luồng thấp (-j2) để tránh bị GitHub chặn IP hoặc rớt gói tin giữa chừng
        python3 /usr/local/bin/repo sync -c -j2 --force-sync --no-tags --no-clone-bundle

    - name: Inject microG & Patch System
      run: |
        cd android-x86
        echo "=== Nhung microG vao he thong ==="
        mkdir -p vendor/lineage/prebuilt/common/priv-app/GmsCore
        mkdir -p vendor/lineage/prebuilt/common/priv-app/GsfProxy
        mkdir -p vendor/lineage/prebuilt/common/app/FakeStore

        wget -O vendor/lineage/prebuilt/common/priv-app/GmsCore/GmsCore.apk https://microg.org/fdroid/repo/com.google.android.gms-240913006.apk
        wget -O vendor/lineage/prebuilt/common/priv-app/GsfProxy/GsfProxy.apk https://microg.org/fdroid/repo/com.google.android.gsf.login-20.apk
        wget -O vendor/lineage/prebuilt/common/app/FakeStore/FakeStore.apk https://microg.org/fdroid/repo/com.android.vending-20.apk

        MK_FILE=""
        if [ -f "device/generic/common/device.mk" ]; then
          MK_FILE="device/generic/common/device.mk"
        elif [ -f "vendor/lineage/config/common.mk" ]; then
          MK_FILE="vendor/lineage/config/common.mk"
        fi
        
        if [ -n "$MK_FILE" ]; then
          echo "Ghi cau hinh vao file: $MK_FILE"
          echo -e "\nPRODUCT_COPY_FILES += \\\\\n  vendor/lineage/prebuilt/common/priv-app/GmsCore/GmsCore.apk:system/priv-app/GmsCore/GmsCore.apk \\\\\n  vendor/lineage/prebuilt/common/priv-app/GsfProxy/GsfProxy.apk:system/priv-app/GsfProxy/GsfProxy.apk \\\\\n  vendor/lineage/prebuilt/common/app/FakeStore/FakeStore.apk:system/app/FakeStore/FakeStore.apk" >> $MK_FILE
        fi

    - name: Build LineageOS ISO
      run: |
        cd android-x86
        export WITHOUT_CHECK_API=true
        export LC_ALL=C
        
        source build/envsetup.sh
        lunch lineage_${{ env.DEVICE_NAME }}-userdebug || lunch ${{ env.DEVICE_NAME }}-userdebug
        make -j$(nproc) iso_img

    - name: Check Artifacts
      run: |
        echo "=== Kiem tra file ISO ==="
        ls -lh android-x86/out/target/product/${{ env.DEVICE_NAME }}/*.iso || ls -lh android-x86/out/target/product/*/*.iso || echo "Khong tim thay file ISO!"

    - name: Upload ISO to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "LineageOS-15.1-Native-${{ github.run_number }}"
        name: "LineageOS 15.1 PC (Manifest Patched) (Build #${{ github.run_number }})"
        body: |
          Bản build sửa lỗi triệt để đường truyền remote bằng cách cấu hình động (sed patch) trực tiếp vào tệp tin manifest gốc.
        files: android-x86/out/target/product/${{ env.DEVICE_NAME }}/*.iso
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}