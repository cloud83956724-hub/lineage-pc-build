name: Build LineageOS 15.1 for PC (Fix Queue & GLIBC)

on:
  workflow_dispatch:

env:
  ROM_URL: "https://osdn.net/projects/android-x86/scm/git/manifest"
  ROM_BRANCH: "lineage-15.1"
  DEVICE_NAME: "android_x86_64"

jobs:
  build:
    # Chuyển về hệ điều hành mới nhất để GitHub cấp máy ngay lập tức
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Maximize Build Space
      run: |
        echo "=== Trước khi dọn dẹp ==="
        df -h
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /share/miniconda
        sudo docker image prune --all --force
        echo "=== Sau khi dọn dẹp ==="
        df -h

    - name: Checkout Repository
      uses: actions/checkout@v4

    # Dùng Docker chạy Ubuntu 18.04 độc lập để bypass hoàn toàn lỗi GLIBC của Node.js
    # Toàn bộ quá trình đồng bộ và build sẽ gom gọn vào trong một container Docker sạch
     Sir bản build này không phụ thuộc vào môi trường bên ngoài của GitHub.
    - name: Build ROM inside Ubuntu 18.04 Docker Container
      run: |
        docker run --privileged -v ${{ github.workspace }}:/work -w /work ubuntu:18.04 bash -c '
          # 1. Cài đặt các package cần thiết trong môi trường 18.04
          apt-get update && apt-get install -y git-core gnupg flex bison gperf build-essential zip curl zlib1g-dev \
            gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev \
            libx11-dev lib32z-dev ccache libgl1-mesa-dev libxml2-utils xsltproc unzip mtools \
            u-boot-tools scons dkms python-minimal libssl-dev bc squashfs-tools openjdk-8-jdk wget
          
          # 2. Cài đặt Repo Tool
          mkdir -p /usr/local/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > /usr/local/bin/repo
          chmod a+x /usr/local/bin/repo
          
          # 3. Cấu hình Git nội bộ
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # 4. Tạo thư mục và tiến hành sync source
          mkdir -p android-x86
          cd android-x86
          repo init -u ${{ env.ROM_URL }} -b ${{ env.ROM_BRANCH }}
          repo sync -c -j4 --force-sync --no-clone-bundle --no-tags
          
          # 5. Khởi động quá trình build ISO
          . build/envsetup.sh
          lunch ${{ env.DEVICE_NAME }}-userdebug
          make -j$(nproc) iso_img
        '

    - name: Check Artifacts
      run: |
        echo "=== Kiểm tra file ISO vừa build ==="
        ls -lh android-x86/out/target/product/${{ env.DEVICE_NAME }}/*.iso || echo "Không tìm thấy file ISO!"

    - name: Upload ISO to GitHub Release
      uses: softprops/action-gh-release@v2
      if: success()
      with:
        tag_name: "LineageOS-15.1-x86_64-${{ github.run_number }}"
        name: "LineageOS 15.1 PC x86_64 (Build #${{ github.run_number }})"
        body: |
          Bản build tự động LineageOS 15.1 cho PC x86_64 sử dụng Docker Isolation để khắc phục lỗi hệ thống.
        files: android-x86/out/target/product/${{ env.DEVICE_NAME }}/*.iso
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
