name: Build LineageOS 15.1 PC with microG Built-in

on:
  workflow_dispatch:

env:
  ROM_URL: "https://github.com/LineageOS/android.git"
  ROM_BRANCH: "lineage-15.1"
  DEVICE_NAME: "android_x86_64"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Maximize Build Space
      run: |
        echo "=== Truoc khi don dep ==="
        df -h
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /share/miniconda
        sudo docker image prune --all --force
        echo "=== Sau khi don dep ==="
        df -h

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Build ROM inside Docker Container
      run: |
        docker run --privileged -v ${{ github.workspace }}:/work -w /work ubuntu:20.04 bash -c '
          # 1. Cap nhat va cai dat moi truong
          apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y tzdata
          apt-get install -y git-core gnupg flex bison gperf build-essential zip curl zlib1g-dev \
            gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev \
            libx11-dev lib32z-dev ccache libgl1-mesa-dev libxml2-utils xsltproc unzip mtools \
            u-boot-tools scons dkms python2 python-is-python2 libssl-dev bc squashfs-tools openjdk-8-jdk wget python3
          
          # 2. Cai dat Repo Tool
          mkdir -p /usr/local/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > /usr/local/bin/repo
          chmod a+x /usr/local/bin/repo
          
          # 3. Cau hinh Git
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # 4. Khoi tao thu muc va dong bo tu LineageOS
          mkdir -p android-x86
          cd android-x86
          repo init -u ${{ env.ROM_URL }} -b ${{ env.ROM_BRANCH }} --git-lfs
          
          # 5. Them local_manifests cho x86 PC
          mkdir -p .repo/local_manifests
          echo "<?xml version=\"1.0\" encoding=\"UTF-8\"?>
          <manifest>
            <remote name=\"ax86\" fetch=\"https://github.com/android-x86\" />
            <project path=\"device/generic/common\" name=\"device_generic_common\" remote=\"ax86\" revision=\"oreo-x86\" />
            <project path=\"device/generic/x86\" name=\"device_generic_x86\" remote=\"ax86\" revision=\"oreo-x86\" />
            <project path=\"device/generic/x86_64\" name=\"device_generic_x86_64\" remote=\"ax86\" revision=\"oreo-x86\" />
            <project path=\"kernel/x86\" name=\"kernel\" remote=\"ax86\" revision=\"kernel-4.19\" />
          </manifest>" > .repo/local_manifests/x86.xml

          # Dong bo ma nguon
          repo sync -c -j4 --force-sync --no-clone-bundle --no-tags
          
          # 6. Tu dong va Signature Spoofing (Yeu cau bat buoc cua microG)
          echo "=== Dang thuc hien va chu ky (Signature Spoofing Patch) ==="
          cd frameworks/base
          wget https://raw.githubusercontent.com/microg/android_packages_apps_GmsCore/master/patches/android_frameworks_base-O.patch
          git apply android_frameworks_base-O.patch || echo "Patch chu ky thit lap thu cong hoac co san"
          cd ../..

          # 7. Tai cac file APK cua microG va tich hop truc tiep vao System
          echo "=== Dang tai và nhung microG APKs ==="
          mkdir -p vendor/lin/prebuilt/common/priv-app/GmsCore
          mkdir -p vendor/lin/prebuilt/common/priv-app/GsfProxy
          mkdir -p vendor/lin/prebuilt/common/app/FakeStore

          # Tai GmsCore (Dich vu Google Gia lap)
          wget -O vendor/lin/prebuilt/common/priv-app/GmsCore/GmsCore.apk https://github.com/microg/GmsCore/releases/latest/download/com.google.android.gms.apk
          # Tai GsfProxy (Khung ket noi Cloud Messaging)
          wget -O vendor/lin/prebuilt/common/priv-app/GsfProxy/GsfProxy.apk https://github.com/microg/GsfProxy/releases/latest/download/com.google.android.gsf.login.apk
          # Tai FakeStore (De danh lua cac app doi hoi Play Store)
          wget -O vendor/lin/prebuilt/common/app/FakeStore/FakeStore.apk https://github.com/microg/FakeStore/releases/latest/download/com.android.vending.apk

          # Tao file dinh nghia build de Android tu dong nhan dien 3 tap tin tren
          echo -e "PRODUCT_COPY_FILES += \\\\\n  vendor/lin/prebuilt/common/priv-app/GmsCore/GmsCore.apk:system/priv-app/GmsCore/GmsCore.apk \\\\\n  vendor/lin/prebuilt/common/priv-app/GsfProxy/GsfProxy.apk:system/priv-app/GsfProxy/GsfProxy.apk \\\\\n  vendor/lin/prebuilt/common/app/FakeStore/FakeStore.apk:system/app/FakeStore/FakeStore.apk" >> device/generic/common/device.mk

          # 8. Chay lenh khoi dong build ISO
          . build/envsetup.sh
          lunch ${{ env.DEVICE_NAME }}-userdebug
          make -j$(nproc) iso_img
        '

    - name: Check Artifacts
      run: |
        echo "=== Kiem tra file ISO ==="
        ls -lh android-x86/out/target/product/${{ env.DEVICE_NAME }}/*.iso || echo "Khong tim thay file ISO!"

    - name: Upload ISO to GitHub Release
      uses: softprops/action-gh-release@v2
      if: success()
      with:
        tag_name: "LineageOS-15.1-microG-${{ github.run_number }}"
        name: "LineageOS 15.1 PC x86_64 + microG (Build #${{ github.run_number }})"
        body: |
          Bản build LineageOS 15.1 (Android 8.1 Oreo) cho PC x86_64.
          - Tích hợp sẵn gói dịch vụ microG (GmsCore, GsfProxy, FakeStore).
          - Đã áp dụng bản vá hệ thống Signature Spoofing Patch hoàn chỉnh.
        files: android-x86/out/target/product/${{ env.DEVICE_NAME }}/*.iso
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
