name: Build LineageOS 15.1 PC (GitHub Native Fault-Tolerant Solution)

on:
  workflow_dispatch:

env:
  ROM_URL: "https://github.com/android-x86/manifest"
  DEVICE_NAME: "android_x86_64"

jobs:
  build:
    runs-on: ubuntu-22.04

    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Free Disk Space
      run: |
        sudo docker image prune --all --force
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        df -h

    - name: Install Android Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git-core gnupg flex bison gperf build-essential zip curl zlib1g-dev \
          gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev \
          libx11-dev lib32z-dev ccache libgl1-mesa-dev libxml2-utils xsltproc unzip mtools \
          u-boot-tools scons dkms bc squashfs-tools python3-pycryptodome python-is-python3

    - name: Install Repo Tool
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/local/bin/repo

    - name: Configure Git Identity
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"

    - name: Initialize and Sync Source Code
      run: |
        mkdir -p android-x86
        cd android-x86
        
        # Khởi tạo repo dựa trên nhánh mặc định của android-x86
        repo init -u ${{ env.ROM_URL }} --no-clone-bundle --depth=1
        
        echo "=== Bắt đầu Sync mã nguồn với các tham số chuẩn ==="
        # Sử dụng --force-sync và --no-tags để tăng tốc và dọn dẹp xung đột cấu trúc cũ
        repo sync -c -j4 --force-sync --no-tags --no-clone-bundle || true
        
        echo "=== Kiểm tra lại thư mục sau khi sync ==="
        ls -la

    - name: Build LineageOS ISO
      run: |
        cd android-x86
        export WITHOUT_CHECK_API=true
        export LC_ALL=C
        
        # Kiểm tra xem file cấu hình môi trường có tồn tại không trước khi nạp
        if [ -f "build/envsetup.sh" ]; then
          source build/envsetup.sh
          # Tự động thử nghiệm các biến thể lunch dựa trên cấu trúc cây thư mục Android-x86
          lunch lineage_${{ env.DEVICE_NAME }}-userdebug || lunch android_${{ env.DEVICE_NAME }}-userdebug || lunch ${{ env.DEVICE_NAME }}-userdebug || lunch lineage_x86_64-userdebug
          make -j$(nproc) iso_img
        else
          echo "Không tìm thấy build/envsetup.sh. Quá trình sync mã nguồn có thể đã gặp lỗi nặng."
          exit 1
        fi

    - name: Check Artifacts
      run: |
        echo "=== Kiểm tra đầu ra file ISO ==="
        ls -lh android-x86/out/target/product/${{ env.DEVICE_NAME }}/*.iso || ls -lh android-x86/out/target/product/*/*.iso || echo "Khong tim thay file ISO!"

    - name: Upload ISO to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "LineageOS-PC-CleanBuild-${{ github.run_number }}"
        name: "LineageOS PC (Clean Build) (Build #${{ github.run_number }})"
        body: |
          Bản build sạch (Clean Build), đã loại bỏ microG để tối ưu độ ổn định và sửa lỗi tham số đồng bộ `repo sync`.
        files: android-x86/out/target/product/${{ env.DEVICE_NAME }}/*.iso
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}