name: Build LineageOS 15.1 for PC (Fix Queue & GLIBC)

on:
  workflow_dispatch:

env:
  ROM_URL: "https://github.com/android-x86/manifest"
  ROM_BRANCH: "oreo-x86" # <-- Đã sửa thành tên nhánh chính xác trên GitHub
  DEVICE_NAME: "android_x86_64"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Maximize Build Space
      run: |
        echo "=== Truoc khi don dep ==="
        df -h
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /share/miniconda
        sudo docker image prune --all --force
        echo "=== Sau khi don dep ==="
        df -h

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Build ROM inside Ubuntu 18.04 Docker Container
      run: |
        docker run --privileged -v ${{ github.workspace }}:/work -w /work ubuntu:18.04 bash -c '
          apt-get update && apt-get install -y git-core gnupg flex bison gperf build-essential zip curl zlib1g-dev \
            gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev \
            libx11-dev lib32z-dev ccache libgl1-mesa-dev libxml2-utils xsltproc unzip mtools \
            u-boot-tools scons dkms python-minimal libssl-dev bc squashfs-tools openjdk-8-jdk wget
          
          mkdir -p /usr/local/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > /usr/local/bin/repo
          chmod a+x /usr/local/bin/repo
          
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          mkdir -p android-x86
          cd android-x86
          repo init -u ${{ env.ROM_URL }} -b ${{ env.ROM_BRANCH }}
          repo sync -c -j4 --force-sync --no-clone-bundle --no-tags
          
          . build/envsetup.sh
          lunch ${{ env.DEVICE_NAME }}-userdebug
          make -j$(nproc) iso_img
        '

    - name: Check Artifacts
      run: |
        echo "=== Kiem tra file ISO ==="
        ls -lh android-x86/out/target/product/${{ env.DEVICE_NAME }}/*.iso || echo "Khong tim thay file ISO!"

    - name: Upload ISO to GitHub Release
      uses: softprops/action-gh-release@v2
      if: success()
      with:
        tag_name: "LineageOS-15.1-x86_64-${{ github.run_number }}"
        name: "LineageOS 15.1 PC x86_64 (Build #${{ github.run_number }})"
        body: |
          Bản build tự động LineageOS 15.1 cho PC x86_64 sử dụng mã nguồn chuẩn từ nhánh oreo-x86.
        files: android-x86/out/target/product/${{ env.DEVICE_NAME }}/*.iso
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
