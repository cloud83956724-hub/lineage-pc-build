name: Build LineageOS 15.1 for PC (Fix GLIBC Error)

on:
  workflow_dispatch:

env:
  ROM_URL: "https://osdn.net/projects/android-x86/scm/git/manifest"
  ROM_BRANCH: "lineage-15.1"
  DEVICE_NAME: "android_x86_64"

jobs:
  build:
    runs-on: ubuntu-20.04
    permissions:
      contents: write

    steps:
    - name: Maximize Build Space
      run: |
        echo "=== Trước khi dọn dẹp ==="
        df -h
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /share/miniconda
        sudo docker image prune --all --force
        echo "=== Sau khi dọn dẹp ==="
        df -h

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install and Downgrade Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y software-properties-common
        sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
        sudo apt-get update
        
        sudo apt-get install -y git-core gnupg flex bison gperf build-essential zip curl zlib1g-dev \
          gcc-7 g++-7 gcc-7-multilib g++-7-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev \
          libx11-dev lib32z-dev ccache libgl1-mesa-dev libxml2-utils xsltproc unzip mtools \
          u-boot-tools scons dkms python2 python-is-python2 libssl-dev bc squashfs-tools openjdk-8-jdk
        
        sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-7 90 --slave /usr/bin/g++ g++ /usr/bin/g++-7
        sudo update-alternatives --config gcc

    - name: Install Repo Tool
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Configure Git
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"

    - name: Initialize and Sync Source Code
      run: |
        mkdir -p android-x86
        cd android-x86
        repo init -u ${{ env.ROM_URL }} -b ${{ env.ROM_BRANCH }}
        repo sync -c -j4 --force-sync --no-clone-bundle --no-tags

    - name: Build LineageOS ISO
      run: |
        cd android-x86
        source build/envsetup.sh
        lunch ${{ env.DEVICE_NAME }}-userdebug
        make -j$(nproc) iso_img

    - name: Check Artifacts
      run: |
        cd android-x86
        echo "=== Kiểm tra file ISO vừa build ==="
        ls -lh out/target/product/${{ env.DEVICE_NAME }}/*.iso || echo "Không tìm thấy file ISO!"

    - name: Upload ISO to GitHub Release
      uses: softprops/action-gh-release@v2
      if: success()
      with:
        tag_name: "LineageOS-15.1-x86_64-${{ github.run_number }}"
        name: "LineageOS 15.1 PC x86_64 (Build #${{ github.run_number }})"
        body: |
          Bản build tự động LineageOS 15.1 cho PC x86_64.
        files: android-x86/out/target/product/${{ env.DEVICE_NAME }}/*.iso
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
