name: Build LineageOS 15.1 PC (Native Optimized Solution)

on:
  workflow_dispatch:

env:
  ROM_URL: "https://github.com/LineageOS/android.git"
  ROM_BRANCH: "lineage-15.1"
  DEVICE_NAME: "android_x86_64"

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - name: Maximize Build Space
      run: |
        echo "=== Don dep dung luong o dia ==="
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /share/miniconda
        sudo docker image prune --all --force

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Build Dependencies (Native Host)
      run: |
        sudo apt-get update
        sudo apt-get install -y git-core gnupg flex bison gperf build-essential zip curl zlib1g-dev \
          gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev \
          libx11-dev lib32z-dev ccache libgl1-mesa-dev libxml2-utils xsltproc unzip mtools \
          u-boot-tools scons dkms bc squashfs-tools openjdk-8-jdk wget python3 python2-minimal
        
        sudo ln -sf /usr/bin/python3 /usr/bin/python

    - name: Install Repo Tool
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Configure Git
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"

    - name: Initialize and Sync Source Code
      run: |
        mkdir -p android-x86
        cd android-x86
        
        repo init -u ${{ env.ROM_URL }} -b ${{ env.ROM_BRANCH }} --no-clone-bundle --depth=1
        
        # Tạo local manifest thông minh: Xóa các project trùng lặp của LineageOS rồi đè driver PC vào
        mkdir -p .repo/local_manifests
        echo '<?xml version="1.0" encoding="UTF-8"?>
        <manifest>
          <remote name="ax86" fetch="https://github.com/android-x86" />
          
          <remove-project name="android_device_generic_common" />
          <remove-project name="android_device_generic_x86" />
          <remove-project name="android_device_generic_x86_64" />
          <remove-project name="android_kernel_x86" />
          
          <project path="device/generic/common" name="device_generic_common" remote="ax86" revision="refs/heads/magnum" />
          <project path="device/generic/x86" name="device_generic_x86" remote="ax86" revision="refs/heads/magnum" />
          <project path="device/generic/x86_64" name="device_generic_x86_64" remote="ax86" revision="refs/heads/magnum" />
          <project path="kernel/x86" name="kernel" remote="ax86" revision="refs/heads/magnum" />
        </manifest>' > .repo/local_manifests/x86.xml

        # Tiến hành đồng bộ mã nguồn sạch sẽ
        repo sync -c -j4 --force-sync --no-tags

    - name: Inject microG & Patch System
      run: |
        cd android-x86
        echo "=== Nhung microG vao he thong ==="
        mkdir -p vendor/lineage/prebuilt/common/priv-app/GmsCore
        mkdir -p vendor/lineage/prebuilt/common/priv-app/GsfProxy
        mkdir -p vendor/lineage/prebuilt/common/app/FakeStore

        wget -O vendor/lineage/prebuilt/common/priv-app/GmsCore/GmsCore.apk https://microg.org/fdroid/repo/com.google.android.gms-240913006.apk
        wget -O vendor/lineage/prebuilt/common/priv-app/GsfProxy/GsfProxy.apk https://microg.org/fdroid/repo/com.google.android.gsf.login-20.apk
        wget -O vendor/lineage/prebuilt/common/app/FakeStore/FakeStore.apk https://microg.org/fdroid/repo/com.android.vending-20.apk

        MK_FILE=""
        if [ -f "vendor/lineage/config/common.mk" ]; then
          MK_FILE="vendor/lineage/config/common.mk"
        else
          MK_FILE=$(find . -name "device.mk" | head -n 1)
        fi
        
        if [ -n "$MK_FILE" ]; then
          echo "Ghi cau hinh vao file: $MK_FILE"
          echo -e "\nPRODUCT_COPY_FILES += \\\\\n  vendor/lineage/prebuilt/common/priv-app/GmsCore/GmsCore.apk:system/priv-app/GmsCore/GmsCore.apk \\\\\n  vendor/lineage/prebuilt/common/priv-app/GsfProxy/GsfProxy.apk:system/priv-app/GsfProxy/GsfProxy.apk \\\\\n  vendor/lineage/prebuilt/common/app/FakeStore/FakeStore.apk:system/app/FakeStore/FakeStore.apk" >> $MK_FILE
        fi

    - name: Build LineageOS ISO
      run: |
        sudo ln -sf /usr/bin/python2 /usr/bin/python
        
        cd android-x86
        export WITHOUT_CHECK_API=true
        export LC_ALL=C
        
        source build/envsetup.sh
        # Chạy lệnh lunch nạp cấu hình target x86_64 PC
        lunch lineage_${{ env.DEVICE_NAME }}-userdebug || lunch ${{ env.DEVICE_NAME }}-userdebug
        make -j$(nproc) iso_img

    - name: Check Artifacts
      run: |
        echo "=== Kiem tra file ISO ==="
        ls -lh android-x86/out/target/product/${{ env.DEVICE_NAME }}/*.iso || ls -lh android-x86/out/target/product/*/*.iso || echo "Khong tim thay file ISO!"

    - name: Upload ISO to GitHub Release
      uses: softprops/action-gh-release@v2
      if: success()
      with:
        tag_name: "LineageOS-15.1-PC-microG-${{ github.run_number }}"
        name: "LineageOS 15.1 PC x86_64 + microG (Build #${{ github.run_number }})"
        body: |
          Bản build hoàn chỉnh sử dụng kỹ thuật loại bỏ xung đột Local Manifest, tích hợp microG.
        files: android-x86/out/target/product/${{ env.DEVICE_NAME }}/*.iso
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
