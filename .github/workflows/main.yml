name: Build LineageOS 15.1 PC (GitHub Native Fault-Tolerant Solution)

on:
  workflow_dispatch:

env:
  ROM_URL: "https://github.com/android-x86/manifest"
  DEVICE_NAME: "android_x86_64"

jobs:
  build:
    runs-on: ubuntu-22.04

    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Free Disk Space & Clean Old Cache
      run: |
        sudo docker image prune --all --force
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        # Đảm bảo dọn sạch mọi rác rưởi của các lần chạy trước để không bị nghẽn Git
        rm -rf android-x86 .repo
        df -h

    - name: Install Android Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git-core gnupg flex bison gperf build-essential zip curl zlib1g-dev \
          gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev \
          libx11-dev lib32z-dev ccache libgl1-mesa-dev libxml2-utils xsltproc unzip mtools \
          u-boot-tools scons dkms bc squashfs-tools python3-pycryptodome python-is-python3

    - name: Install Repo Tool
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/local/bin/repo

    - name: Configure Git Identity with Timeout Fix
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        # Cấu hình ép Git phải tự ngắt và kết nối lại nếu bị đứng hình quá 300 giây
        git config --global http.lowSpeedLimit 1000
        git config --global http.lowSpeedTime 300

    - name: Pure Tsinghua Sync (No Google, No Freeze)
      run: |
        mkdir -p android-x86
        cd android-x86
        
        echo "=== Khởi tạo Manifest Sạch ==="
        repo init -u ${{ env.ROM_URL }} --no-clone-bundle --depth=1
        
        echo "=== Bẻ lái vĩnh viễn sang Tsinghua ==="
        if [ -f ".repo/manifests/default.xml" ]; then
          sed -i 's|fetch="https://android.googlesource.com/"|fetch="https://mirrors.tuna.tsinghua.edu.cn/git/AOSP/"|g' .repo/manifests/default.xml
          sed -i 's|fetch=".."|fetch="https://mirrors.tuna.tsinghua.edu.cn/git/AOSP/"|g' .repo/manifests/default.xml
        fi
        if [ -f ".repo/manifest.xml" ]; then
          sed -i 's|fetch="https://android.googlesource.com/"|fetch="https://mirrors.tuna.tsinghua.edu.cn/git/AOSP/"|g' .repo/manifest.xml
        fi

        echo "=== Bắt đầu kéo mã nguồn với cơ chế chống nghẽn ==="
        # Hạ xuống -j2 ngay từ đầu để giữ kết nối ổn định, không làm máy chủ Tsinghua chặn băng thông
        # Thêm --fail-fast để nếu có gói nào lỗi thật thì báo ngay lập tức chứ không đứng im đợi chờ
        if ! repo sync -c -j2 --force-sync --no-tags --no-clone-bundle --fail-fast; then
          echo "Phát hiện gói bị kẹt, kích hoạt lệnh rà soát cưỡng bức..."
          repo sync -c -j1 --force-sync --no-tags --no-clone-bundle
        fi
        
        echo "=== Kiểm tra cấu trúc thư mục ==="
        ls -la

    - name: Build LineageOS ISO
      run: |
        cd android-x86
        export WITHOUT_CHECK_API=true
        export LC_ALL=C
        
        if [ -f "build/envsetup.sh" ]; then
          source build/envsetup.sh
          lunch lineage_${{ env.DEVICE_NAME }}-userdebug || lunch android_${{ env.DEVICE_NAME }}-userdebug || lunch ${{ env.DEVICE_NAME }}-userdebug || lunch lineage_x86_64-userdebug
          make -j$(nproc) iso_img
        else
          echo "Lỗi: Vẫn không lấy được tệp envsetup.sh!"
          exit 1
        fi

    - name: Check Artifacts
      run: |
        echo "=== Kiểm tra đầu ra file ISO ==="
        ls -lh android-x86/out/target/product/${{ env.DEVICE_NAME }}/*.iso || ls -lh android-x86/out/target/product/*/*.iso || echo "Khong tim thay file ISO!"

    - name: Upload ISO to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "LineageOS-PC-CleanBuild-${{ github.run_number }}"
        name: "LineageOS PC (Clean Build) (Build #${{ github.run_number }})"
        body: |
          Bản build phá vỡ tình trạng đóng băng (Anti-Freeze) bằng cách tối ưu tham số cấu hình kết nối Git thấp và ép dùng luồng an toàn.
        files: android-x86/out/target/product/${{ env.DEVICE_NAME }}/*.iso
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}