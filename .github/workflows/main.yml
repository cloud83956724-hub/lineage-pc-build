name: Build LineageOS 15.1 PC (GitHub Native Fault-Tolerant Solution)

on:
  workflow_dispatch:

env:
  ROM_URL: "https://github.com/android-x86/manifest"
  DEVICE_NAME: "android_x86_64"

jobs:
  build:
    runs-on: ubuntu-22.04

    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Free Disk Space
      run: |
        sudo docker image prune --all --force
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        df -h

    - name: Install Android Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git-core gnupg flex bison gperf build-essential zip curl zlib1g-dev \
          gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev \
          libx11-dev lib32z-dev ccache libgl1-mesa-dev libxml2-utils xsltproc unzip mtools \
          u-boot-tools scons dkms bc squashfs-tools python3-pycryptodome python-is-python3

    - name: Install Repo Tool
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/local/bin/repo

    - name: Configure Git Identity
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"

    - name: Infinite Path Sync (Try All Paths Until Success)
      run: |
        mkdir -p android-x86
        cd android-x86
        
        echo "=== Khởi tạo Manifest gốc ==="
        repo init -u ${{ env.ROM_URL }} --no-clone-bundle --depth=1
        
        # Danh sách các con đường (Mirrors) có thể đi cứu cánh cho lỗi 404 Google
        MIRRORS=(
          "https://mirrors.tuna.tsinghua.edu.cn/git/AOSP/"
          "https://mirrors.ustc.edu.cn/aosp/"
          "https://mirrors.aliyun.com/img/aosp/"
        )
        
        success=false
        
        echo "=== [ĐƯỜNG A] Thử nghiệm đồng bộ mặc định từ Google ==="
        if repo sync -c -j4 --force-sync --no-tags --no-clone-bundle; then
          success=true
        fi
        
        # Nếu đường A gục ngã, bắt đầu duyệt qua các con đường khác
        if [ "$success" = false ]; then
          echo "Đường A sập (Lỗi 404 hoặc nghẽn mạng). Kích hoạt chiến dịch chuyển hướng!"
          
          for mirror in "${MIRRORS[@]}"; do
            echo "--------------------------------------------------------"
            echo "ĐANG CHUYỂN HƯỚNG SANG CON ĐƯỜNG MỚI: $mirror"
            echo "--------------------------------------------------------"
            
            # Vá lại toàn bộ liên kết trong cấu trúc .repo sang Mirror mới
            if [ -f ".repo/manifests/default.xml" ]; then
              sed -i "s|fetch=\"https://android.googlesource.com/\"|fetch=\"$mirror\"|g" .repo/manifests/default.xml
              sed -i "s|fetch=\"..\"|fetch=\"$mirror\"|g" .repo/manifests/default.xml
            fi
            if [ -f ".repo/manifest.xml" ]; then
              sed -i "s|fetch=\"https://android.googlesource.com/\"|fetch=\"$mirror\"|g" .repo/manifest.xml
              sed -i "s|fetch=\"..\"|fetch=\"$mirror\"|g" .repo/manifest.xml
            fi
            
            # Thử sync lại với luồng tải an toàn hơn để tránh bị block bớ
            if repo sync -c -j2 --force-sync --no-tags --no-clone-bundle; then
              echo "Thành công rực rỡ tại con đường: $mirror!"
              success=true
              break
            else
              echo "Con đường $mirror vẫn không qua được, chuẩn bị đổi ngả..."
            fi
          done
        fi
        
        if [ "$success" = false ]; then
          echo "Tất cả các con đường cứu trợ đều bị chặn. Ép hệ thống chạy kiểm tra vớt vát..."
        fi
        
        echo "=== Thư mục hiện tại sau chiến dịch ==="
        ls -la

    - name: Build LineageOS ISO
      run: |
        cd android-x86
        export WITHOUT_CHECK_API=true
        export LC_ALL=C
        
        if [ -f "build/envsetup.sh" ]; then
          source build/envsetup.sh
          lunch lineage_${{ env.DEVICE_NAME }}-userdebug || lunch android_${{ env.DEVICE_NAME }}-userdebug || lunch ${{ env.DEVICE_NAME }}-userdebug || lunch lineage_x86_64-userdebug
          make -j$(nproc) iso_img
        else
          echo "Không thể tìm thấy công cụ thiết lập build. Mã nguồn chưa đầy đủ!"
          exit 1
        fi

    - name: Check Artifacts
      run: |
        echo "=== Kiểm tra đầu ra file ISO ==="
        ls -lh android-x86/out/target/product/${{ env.DEVICE_NAME }}/*.iso || ls -lh android-x86/out/target/product/*/*.iso || echo "Khong tim thay file ISO!"

    - name: Upload ISO to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "LineageOS-PC-CleanBuild-${{ github.run_number }}"
        name: "LineageOS PC (Clean Build) (Build #${{ github.run_number }})"
        body: |
          Bản build tích hợp thuật toán 'Vạn dặm tìm đường': Tự động đổi ngả sang Tsinghua, USTC, hoặc Aliyun khi một nguồn bị sập.
        files: android-x86/out/target/product/${{ env.DEVICE_NAME }}/*.iso
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}