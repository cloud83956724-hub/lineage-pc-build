name: Build LineageOS 15.1 for PC (Ubuntu 18.04 Container)

on:
  workflow_dispatch: # Kích hoạt thủ công bằng nút bấm

env:
  ROM_URL: "https://osdn.net/projects/android-x86/scm/git/manifest"
  ROM_BRANCH: "lineage-15.1"
  DEVICE_NAME: "android_x86_64"

jobs:
  build:
    runs-on: ubuntu-latest
    # Ép toàn bộ môi trường build về Ubuntu 18.04 để không bị lỗi compiler mới
    container:
      image: ubuntu:18.04
    permissions:
      contents: write

    steps:
    # Bước này cần chạy trên Host để dọn dẹp dung lượng trước khi nạp Container vào
    - name: Free Disk Space on Host
      run: |
        echo "=== Ổ đĩa trước khi dọn dẹp ==="
        df -h
        # Xóa các thành phần thừa của GitHub Runner nằm ngoài container
        rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /share/miniconda
        echo "=== Ổ đĩa sau khi dọn dẹp ==="
        df -h

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Build Dependencies (Ubuntu 18.04 Packages)
      run: |
        apt-get update
        # Cài đặt các gói công cụ chuẩn xác cho Android 8.1
        apt-get install -y git-core gnupg flex bison gperf build-essential zip curl zlib1g-dev \
          gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev \
          libx11-dev lib32z-dev ccache libgl1-mesa-dev libxml2-utils xsltproc unzip mtools \
          u-boot-tools scons dkms python-minimal libssl-dev bc squashfs-tools openjdk-8-jdk wget

    - name: Install Repo Tool
      run: |
        mkdir -p /usr/local/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > /usr/local/bin/repo
        chmod a+x /usr/local/bin/repo

    - name: Configure Git
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        # Tránh lỗi Git giải mã ký tự đặc biệt trong container đời cũ
        git config --global core.庫_filemode false 2>/dev/null || true

    - name: Initialize and Sync Source Code
      run: |
        mkdir -p android-x86
        cd android-x86
        repo init -u ${{ env.ROM_URL }} -b ${{ env.ROM_BRANCH }}
        # Đồng bộ mã nguồn với 4 luồng để tối ưu băng thông
        repo sync -c -j4 --force-sync --no-clone-bundle --no-tags

    - name: Build LineageOS ISO
      run: |
        cd android-x86
        # Thiết lập môi trường build của Android
        . build/envsetup.sh
        lunch ${{ env.DEVICE_NAME }}-userdebug
        # Tiến hành build file ISO
        make -j$(nproc) iso_img

    - name: Check Artifacts
      run: |
        cd android-x86
        echo "=== Kiểm tra file ISO vừa build ==="
        ls -lh out/target/product/${{ env.DEVICE_NAME }}/*.iso || echo "Không tìm thấy file ISO!"

    - name: Upload ISO to GitHub Release
      uses: softprops/action-gh-release@v2
      if: success()
      with:
        tag_name: "LineageOS-15.1-x86_64-${{ github.run_number }}"
        name: "LineageOS 15.1 PC x86_64 (Build #${{ github.run_number }})"
        body: |
          Bản build tự động LineageOS 15.1 dành cho máy tính (PC) chạy kiến trúc x86_64.
          Môi trường build ổn định: Container Ubuntu 18.04 LTS.
        files: android-x86/out/target/product/${{ env.DEVICE_NAME }}/*.iso
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
