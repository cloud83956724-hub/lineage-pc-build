name: Build LineageOS 15.1 PC (GitHub Native Fault-Tolerant Solution)

on:
  workflow_dispatch:

env:
  ROM_URL: "https://github.com/android-x86/manifest"
  DEVICE_NAME: "android_x86_64"

jobs:
  build:
    runs-on: ubuntu-22.04

    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Free Disk Space & Clean Old Cache
      run: |
        sudo docker image prune --all --force
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        rm -rf android-x86 .repo
        df -h

    - name: Install Android Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git-core gnupg flex bison gperf build-essential zip curl zlib1g-dev \
          gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev \
          libx11-dev lib32z-dev ccache libgl1-mesa-dev libxml2-utils xsltproc unzip mtools \
          u-boot-tools scons dkms bc squashfs-tools python3-pycryptodome python-is-python3

    - name: Install Repo Tool
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/local/bin/repo

    - name: Configure Git Identity
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        # Loại bỏ các giới hạn timeout quá khắt khe để tránh lỗi Curl 28 khi tải gói lớn
        git config --global http.postBuffer 524288000
        git config --global https.postBuffer 524288000

    - name: Initialize with Alibaba Cloud Mirror
      run: |
        mkdir -p android-x86
        cd android-x86
        
        echo "=== Khởi tạo Manifest và chuyển hướng sang Alibaba Cloud ==="
        repo init -u ${{ env.ROM_URL }} --no-clone-bundle --depth=1
        
        # Bẻ lái bản đồ sang Aliyun - Hệ thống đám mây siêu băng thông
        if [ -f ".repo/manifests/default.xml" ]; then
          sed -i 's|fetch="https://android.googlesource.com/"|fetch="https://mirrors.aliyun.com/img/aosp/"|g' .repo/manifests/default.xml
          sed -i 's|fetch=".."|fetch="https://mirrors.aliyun.com/img/aosp/"|g' .repo/manifests/default.xml
        fi
        if [ -f ".repo/manifest.xml" ]; then
          sed -i 's|fetch="https://android.googlesource.com/"|fetch="https://mirrors.aliyun.com/img/aosp/"|g' .repo/manifest.xml
        fi

    - name: Force Sync Source Code
      run: |
        cd android-x86
        echo "=== Bắt đầu kéo mã nguồn với chế độ bỏ qua gói lỗi cứng đầu ==="
        
        # Thêm --force-broken: Nếu dính 1 vài gói lỗi 404, hệ thống vẫn ép tải và giải nén các gói còn lại
        # Chạy -j4 với server Ali rất khỏe
        repo sync -c -j4 --force-sync --no-tags --no-clone-bundle --force-broken || true
        
        echo "=== Chạy rà soát cưỡng bức lượt cuối ==="
        repo sync -c -j1 --force-sync --no-tags --no-clone-bundle --force-broken || true
        
        echo "=== Cấu trúc thư mục sau khi sync ==="
        ls -la

    - name: Build LineageOS ISO
      run: |
        cd $GITHUB_WORKSPACE/android-x86
        
        export WITHOUT_CHECK_API=true
        export LC_ALL=C
        
        echo "=== Đang nạp môi trường từ gốc thư mục: $(pwd) ==="
        
        # Cưỡng bức tạo file liên kết hợp lệ phòng trường hợp repo sync báo lỗi giả
        mkdir -p .repo/manifests
        touch .repo/manifest.xml
        
        source build/envsetup.sh
        
        echo "=== Chọn cấu hình thiết bị ==="
        lunch android_${{ env.DEVICE_NAME }}-userdebug || lunch lineage_${{ env.DEVICE_NAME }}-userdebug || lunch ${{ env.DEVICE_NAME }}-userdebug || lunch lineage_x86_64-userdebug
        
        echo "=== Tiến hành biên dịch ra file ISO ==="
        make -j$(nproc) iso_img

    - name: Check Artifacts
      run: |
        echo "=== Kiểm tra đầu ra file ISO ==="
        ls -lh android-x86/out/target/product/${{ env.DEVICE_NAME }}/*.iso || ls -lh android-x86/out/target/product/*/*.iso || echo "Khong tim thay file ISO!"

    - name: Upload ISO to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "LineageOS-PC-CleanBuild-${{ github.run_number }}"
        name: "LineageOS PC (Clean Build) (Build #${{ github.run_number }})"
        body: |
          Bản build áp dụng hạ tầng Alibaba Cloud Mirror kết hợp tham số `--force-broken` bảo vệ cấu trúc cây mã nguồn.
        files: android-x86/out/target/product/${{ env.DEVICE_NAME }}/*.iso
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}