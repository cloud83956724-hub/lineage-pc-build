name: Build Bliss OS 11.x PC (Ultimate Driver Compatibility)

on:
  workflow_dispatch:

env:
  ROM_URL: "https://github.com/Bliss-OS/manifest"   # Chuyển sang kho siêu nguồn của Bliss OS
  ROM_BRANCH: "p9.0-x86"                             # Nhánh Android 9 Pie cho PC cực kỳ mượt mà
  DEVICE_NAME: "android_x86_64"

jobs:
  build:
    runs-on: ubuntu-22.04

    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Free Disk Space & Clean Old Cache
      run: |
        sudo docker image prune --all --force
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        rm -rf android-x86 .repo
        df -h

    - name: Install Android Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git-core gnupg flex bison gperf build-essential zip curl zlib1g-dev \
          gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev \
          libx11-dev lib32z-dev ccache libgl1-mesa-dev libxml2-utils xsltproc unzip mtools \
          u-boot-tools scons dkms bc squashfs-tools python3-pycryptodome python-is-python3

    - name: Install Repo Tool
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/local/bin/repo

    - name: Configure Git Identity
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"

    - name: Initialize with Bliss OS Manifest
      run: |
        mkdir -p android-x86
        cd android-x86
        
        echo "=== Khởi tạo Manifest Bliss OS Nhánh chuẩn ${{ env.ROM_BRANCH }} ==="
        repo init -u ${{ env.ROM_URL }} -b ${{ env.ROM_BRANCH }} --no-clone-bundle --depth=1

    - name: Sync Bliss OS Source Code
      run: |
        cd android-x86
        echo "=== Kéo mã nguồn từ hệ thống Bliss OS khỏe mạng ==="
        
        # Đồng bộ trực tiếp từ nguồn Bliss OS (không cần mirror vì server của họ rất chuẩn)
        repo sync -c -j4 --force-sync --no-tags --no-clone-bundle --force-broken || true
        repo sync -c -j1 --force-sync --no-tags --no-clone-bundle --force-broken || true
        
        echo "=== Cấu trúc thư mục sau khi sync ==="
        ls -la

    - name: Build Bliss OS ISO
      run: |
        cd $GITHUB_WORKSPACE/android-x86
        
        export WITHOUT_CHECK_API=true
        export LC_ALL=C
        
        source build/envsetup.sh
        
        echo "=== Chọn cấu hình thiết bị Bliss PC ==="
        lunch android_x86_64-userdebug || lunch bliss_x86_64-userdebug || lunch ${{ env.DEVICE_NAME }}-userdebug
        
        echo "=== Tiến hành biên dịch ra file ISO ==="
        make -j$(nproc) iso_img

    - name: Check Artifacts
      run: |
        echo "=== Kiểm tra đầu ra file ISO ==="
        ls -lh android-x86/out/target/product/*/*.iso || echo "Khong tim thay file ISO!"

    - name: Upload ISO to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "BlissOS-9.0-PC-${{ github.run_number }}"
        name: "Bliss OS 11.x PC (Android 9) (Build #${{ github.run_number }})"
        body: |
          Bản build tối ưu hóa bằng mã nguồn mãnh mẽ của Bliss OS giúp nhận diện 100% driver máy tính và vượt qua giới hạn kho lưu trữ cũ.
        files: android-x86/out/target/product/*/*.iso
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}