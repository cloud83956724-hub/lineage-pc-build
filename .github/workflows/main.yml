name: Build LineageOS 15.1 PC (Docker Ubuntu 16.04 Solution)

on:
  workflow_dispatch:

env:
  # Quay lại dùng nguồn HTTPS chính chủ của Android-x86, chạy trong môi trường cũ sẽ không lo lỗi Git mới
  ROM_URL: "https://osdn.net/projects/android-x86/scm/git/manifest"
  ROM_BRANCH: "lineage-15.1"
  DEVICE_NAME: "android_x86_64"

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Ép GitHub Actions chạy toàn bộ các bước bên trong Container Ubuntu 16.04 chuẩn cổ đại
    container:
      image: ubuntu:16.04

    permissions:
      contents: write

    steps:
    # Bước này chạy lệnh của Host để dọn dẹp ổ đĩa trước khi mở hộp Docker
    - name: Free Disk Space (Host Side)
      run: |
        df -h
        # Vì chạy trong container chung nên ta sẽ tối ưu trực tiếp dung lượng khi chạy bước sau

    - name: Install Fundamental Tools inside Container
      run: |
        # Cập nhật nguồn cho Ubuntu 16.04 (Sử dụng kho lưu trữ cũ ESM/Main)
        sed -i -e 's/archive.ubuntu.com/archive.org/g' /etc/apt/sources.list
        apt-get update
        
        # Cài đặt các công cụ cơ bản để có thể dùng lệnh sudo, curl, git
        apt-get install -y sudo curl git gnupg openjdk-8-jdk wget

    - name: Install Android Build Dependencies (Pure Ubuntu 16.04)
      run: |
        sudo apt-get update
        sudo apt-get install -y git-core gnupg flex bison gperf build-essential zip curl zlib1g-dev \
          gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev \
          libx11-dev lib32z-dev ccache libgl1-mesa-dev libxml2-utils xsltproc unzip mtools \
          u-boot-tools scons dkms bc squashfs-tools python-crypto

    - name: Install Repo Tool (Legacy Compatible)
      run: |
        mkdir -p /usr/local/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > /usr/local/bin/repo
        chmod a+x /usr/local/bin/repo

    - name: Configure Git Identity
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        # Bật cấu hình cho phép Git chạy với các repo cũ không sợ cơ chế bảo mật mới chặn
        git config --global daemon.receivepack true

    - name: Initialize and Sync Source Code
      run: |
        mkdir -p android-x86
        cd android-x86
        
        # Trong Ubuntu 16.04, python mặc định là 2.7, hoàn toàn trùng khớp với Repo Tool đời cũ
        repo init -u ${{ env.ROM_URL }} -b ${{ env.ROM_BRANCH }} --no-clone-bundle --depth=1
        repo sync -c -j4 --force-sync --no-tags

    - name: Inject microG & Patch System
      run: |
        cd android-x86
        echo "=== Nhung microG vao he thong ==="
        mkdir -p vendor/lineage/prebuilt/common/priv-app/GmsCore
        mkdir -p vendor/lineage/prebuilt/common/priv-app/GsfProxy
        mkdir -p vendor/lineage/prebuilt/common/app/FakeStore

        wget -O vendor/lineage/prebuilt/common/priv-app/GmsCore/GmsCore.apk https://microg.org/fdroid/repo/com.google.android.gms-240913006.apk
        wget -O vendor/lineage/prebuilt/common/priv-app/GsfProxy/GsfProxy.apk https://microg.org/fdroid/repo/com.google.android.gsf.login-20.apk
        wget -O vendor/lineage/prebuilt/common/app/FakeStore/FakeStore.apk https://microg.org/fdroid/repo/com.android.vending-20.apk

        MK_FILE=""
        if [ -f "device/generic/common/device.mk" ]; then
          MK_FILE="device/generic/common/device.mk"
        elif [ -f "vendor/lineage/config/common.mk" ]; then
          MK_FILE="vendor/lineage/config/common.mk"
        fi
        
        if [ -n "$MK_FILE" ]; then
          echo "Ghi cau hinh vao file: $MK_FILE"
          echo -e "\nPRODUCT_COPY_FILES += \\\\\n  vendor/lineage/prebuilt/common/priv-app/GmsCore/GmsCore.apk:system/priv-app/GmsCore/GmsCore.apk \\\\\n  vendor/lineage/prebuilt/common/priv-app/GsfProxy/GsfProxy.apk:system/priv-app/GsfProxy/GsfProxy.apk \\\\\n  vendor/lineage/prebuilt/common/app/FakeStore/FakeStore.apk:system/app/FakeStore/FakeStore.apk" >> $MK_FILE
        fi

    - name: Build LineageOS ISO
      run: |
        cd android-x86
        export WITHOUT_CHECK_API=true
        export LC_ALL=C
        
        # Môi trường 16.04 thuần khiết, gọi thẳng lệnh build gốc
        source build/envsetup.sh
        lunch lineage_${{ env.DEVICE_NAME }}-userdebug || lunch ${{ env.DEVICE_NAME }}-userdebug
        make -j$(nproc) iso_img

    - name: Check Artifacts
      run: |
        echo "=== Kiem tra file ISO ==="
        ls -lh android-x86/out/target/product/${{ env.DEVICE_NAME }}/*.iso || ls -lh android-x86/out/target/product/*/*.iso || echo "Khong tim thay file ISO!"

    - name: Upload ISO to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "LineageOS-15.1-Docker-${{ github.run_number }}"
        name: "LineageOS 15.1 PC (Ubuntu 16.04 Toi Uu) (Build #${{ github.run_number }})"
        body: |
          Bản build đột phá chạy trên môi trường Container Ubuntu 16.04 gốc, loại bỏ xung đột hệ thống mới.
        files: android-x86/out/target/product/${{ env.DEVICE_NAME }}/*.iso
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
