name: Build LineageOS 15.1 PC (GitHub Native Fault-Tolerant Solution)

on:
  workflow_dispatch:

env:
  # Sử dụng nguồn Mirror chính thức trên GitHub để tốc độ nhanh và DNS ổn định
  ROM_URL: "https://github.com/android-x86/manifest"
  ROM_BRANCH: "lineage-15.1"
  DEVICE_NAME: "android_x86_64"

jobs:
  build:
    # Sử dụng ubuntu-latest để tránh bị kẹt hàng đợi (Queue) lâu như các bản cũ
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Free Disk Space (Dọn dẹp bộ nhớ máy chủ)
      run: |
        sudo docker image prune --all --force
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        df -h

    - name: Install Android Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git-core gnupg flex bison gperf build-essential zip curl zlib1g-dev \
          gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev \
          libx11-dev lib32z-dev ccache libgl1-mesa-dev libxml2-utils xsltproc unzip mtools \
          u-boot-tools scons dkms bc squashfs-tools python3-crypto python3-textwrap python-is-python3

    - name: Install Repo Tool
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/local/bin/repo

    - name: Configure Git Identity
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"

    - name: Initialize and Sync Source Code (Bản vá bỏ qua lỗi Git 404)
      run: |
        mkdir -p android-x86
        cd android-x86
        
        # Khởi tạo Repo
        repo init -u ${{ env.ROM_URL }} -b ${{ env.ROM_BRANCH }} --no-clone-bundle --depth=1
        
        echo "=== Bắt đầu Sync lần 1: Ép buộc đồng bộ bất chấp lỗi nhánh lẻ ==="
        # Cờ --ignore-broken-branches giúp bỏ qua các kho lưu trữ cũ đã bị Google xóa
        # Toán tử '|| true' ngăn chặn việc GitHub Action tự động ngắt tiến trình khi gặp lỗi fetch lẻ
        repo sync -c -j4 --force-sync --no-tags --no-clone-bundle --ignore-broken-branches || true
        
        echo "=== Bắt đầu Sync lần 2: Kiểm tra dứt điểm các gói cốt lõi ==="
        repo sync -c -j4 --force-sync --ignore-broken-branches || echo "Bỏ qua cảnh báo sync để chuyển sang bước build hệ thống!"

    - name: Inject microG & Patch System
      run: |
        cd android-x86
        echo "=== Nhúng microG và các dịch vụ nền ==="
        mkdir -p vendor/lineage/prebuilt/common/priv-app/GmsCore
        mkdir -p vendor/lineage/prebuilt/common/priv-app/GsfProxy
        mkdir -p vendor/lineage/prebuilt/common/app/FakeStore

        wget -O vendor/lineage/prebuilt/common/priv-app/GmsCore/GmsCore.apk https://microg.org/fdroid/repo/com.google.android.gms-240913006.apk
        wget -O vendor/lineage/prebuilt/common/priv-app/GsfProxy/GsfProxy.apk https://microg.org/fdroid/repo/com.google.android.gsf.login-20.apk
        wget -O vendor/lineage/prebuilt/common/app/FakeStore/FakeStore.apk https://microg.org/fdroid/repo/com.android.vending-20.apk

        MK_FILE=""
        if [ -f "device/generic/common/device.mk" ]; then
          MK_FILE="device/generic/common/device.mk"
        elif [ -f "vendor/lineage/config/common.mk" ]; then
          MK_FILE="vendor/lineage/config/common.mk"
        fi
        
        if [ -n "$MK_FILE" ]; then
          echo "Ghi cấu hình bản sao tập tin hệ thống vào file: $MK_FILE"
          echo -e "\nPRODUCT_COPY_FILES += \\\\\n  vendor/lineage/prebuilt/common/priv-app/GmsCore/GmsCore.apk:system/priv-app/GmsCore/GmsCore.apk \\\\\n  vendor/lineage/prebuilt/common/priv-app/GsfProxy/GsfProxy.apk:system/priv-app/GsfProxy/GsfProxy.apk \\\\\n  vendor/lineage/prebuilt/common/app/FakeStore/FakeStore.apk:system/app/FakeStore/FakeStore.apk" >> $MK_FILE
        fi

    - name: Build LineageOS ISO
      run: |
        cd android-x86
        export WITHOUT_CHECK_API=true
        export LC_ALL=C
        
        source build/envsetup.sh
        lunch lineage_${{ env.DEVICE_NAME }}-userdebug || lunch ${{ env.DEVICE_NAME }}-userdebug
        make -j$(nproc) iso_img

    - name: Check Artifacts
      run: |
        echo "=== Kiểm tra tệp tin đầu ra ISO ==="
        ls -lh android-x86/out/target/product/${{ env.DEVICE_NAME }}/*.iso || ls -lh android-x86/out/target/product/*/*.iso || echo "Không tìm thấy file ISO!"

    - name: Upload ISO to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "LineageOS-15.1-FaultTolerant-${{ github.run_number }}"
        name: "LineageOS 15.1 PC (Fault-Tolerant Build) (Build #${{ github.run_number }})"
        body: |
          Bản build hoàn thiện chạy trên Native Host, kích hoạt chế độ tự động vượt lỗi 404 để hoàn thành giai đoạn nạp mã nguồn.
        files: android-x86/out/target/product/${{ env.DEVICE_NAME }}/*.iso
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}