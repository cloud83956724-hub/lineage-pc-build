name: Build LineageOS 15.1 PC (GitHub Native Fault-Tolerant Solution)

on:
  workflow_dispatch:

env:
  ROM_URL: "https://github.com/android-x86/manifest"
  DEVICE_NAME: "android_x86_64"

jobs:
  build:
    runs-on: ubuntu-22.04

    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Free Disk Space & Clean Old Cache
      run: |
        sudo docker image prune --all --force
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        rm -rf android-x86 .repo
        df -h

    - name: Install Android Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git-core gnupg flex bison gperf build-essential zip curl zlib1g-dev \
          gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev \
          libx11-dev lib32z-dev ccache libgl1-mesa-dev libxml2-utils xsltproc unzip mtools \
          u-boot-tools scons dkms bc squashfs-tools python3-pycryptodome python-is-python3

    - name: Install Repo Tool
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/local/bin/repo

    - name: Configure Git Identity
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git config --global http.lowSpeedLimit 1000
        git config --global http.lowSpeedTime 60

    - name: Initialize with USTC Mirror (Anti-Queue)
      run: |
        mkdir -p android-x86
        cd android-x86
        
        echo "=== Khởi tạo Manifest và ép dùng luôn Mirror USTC ==="
        repo init -u ${{ env.ROM_URL }} --no-clone-bundle --depth=1
        
        # Bẻ lái bản đồ sang USTC (Đại học Khoa học Công nghệ TQ) để né hàng đợi Tsinghua
        if [ -f ".repo/manifests/default.xml" ]; then
          sed -i 's|fetch="https://android.googlesource.com/"|fetch="https://mirrors.ustc.edu.cn/aosp/"|g' .repo/manifests/default.xml
          sed -i 's|fetch=".."|fetch="https://mirrors.ustc.edu.cn/aosp/"|g' .repo/manifests/default.xml
        fi
        if [ -f ".repo/manifest.xml" ]; then
          sed -i 's|fetch="https://android.googlesource.com/"|fetch="https://mirrors.ustc.edu.cn/aosp/"|g' .repo/manifest.xml
        fi

    - name: Sync Source Code from USTC
      run: |
        cd android-x86
        echo "=== Bắt đầu kéo mã nguồn từ USTC ==="
        
        success=false
        # Chạy -j4 để kéo nhanh, nếu USTC ngon lành nó sẽ qua rất mượt
        if repo sync -c -j4 --force-sync --no-tags --no-clone-bundle --fail-fast; then
          success=true
        else
          echo "USTC gặp lỗi nhỏ, chạy rà soát lại với -j2..."
          if repo sync -c -j2 --force-sync --no-tags --no-clone-bundle; then
            success=true
          fi
        fi
        
        if [ "$success" = false ]; then
          echo "Vẫn ép chuyển sang bước build..."
        fi
        
        echo "=== Cấu trúc thư mục sau khi sync ==="
        ls -la

    - name: Build LineageOS ISO
      run: |
        cd android-x86
        export WITHOUT_CHECK_API=true
        export LC_ALL=C
        
        if [ -f "build/envsetup.sh" ]; then
          source build/envsetup.sh
          lunch lineage_${{ env.DEVICE_NAME }}-userdebug || lunch android_${{ env.DEVICE_NAME }}-userdebug || lunch ${{ env.DEVICE_NAME }}-userdebug || lunch lineage_x86_64-userdebug
          make -j$(nproc) iso_img
        else
          echo "Không tìm thấy tệp envsetup.sh!"
          exit 1
        fi

    - name: Check Artifacts
      run: |
        echo "=== Kiểm tra đầu ra file ISO ==="
        ls -lh android-x86/out/target/product/${{ env.DEVICE_NAME }}/*.iso || ls -lh android-x86/out/target/product/*/*.iso || echo "Khong tim thay file ISO!"

    - name: Upload ISO to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "LineageOS-PC-CleanBuild-${{ github.run_number }}"
        name: "LineageOS PC (Clean Build) (Build #${{ github.run_number }})"
        body: |
          Bản build bẻ lái sang USTC Mirror để né tránh hàng đợi quá tải (Queue Position 309) của Tsinghua.
        files: android-x86/out/target/product/${{ env.DEVICE_NAME }}/*.iso
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}