name: Build LineageOS 15.1 PC with microG Built-in

on:
  workflow_dispatch:

env:
  ROM_URL: "https://github.com/LineageOS-x86/manifest"
  ROM_BRANCH: "lineage-15.1"
  DEVICE_NAME: "android_x86_64"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Maximize Build Space
      run: |
        echo "=== Truoc khi don dep ==="
        df -h
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /share/miniconda
        sudo docker image prune --all --force
        echo "=== Sau khi don dep ==="
        df -h

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Build ROM inside Docker Container
      run: |
        docker run --privileged -v ${{ github.workspace }}:/work -w /work ubuntu:20.04 bash -c '
          # 1. Thiet lap Frontend khong tuong tac de tranh crash APT
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y tzdata
          
          # 2. Cai dat cac goi rut gon, tap trung vao core build de nhe tai Docker
          apt-get install -y git-core gnupg flex bison gperf build-essential zip curl zlib1g-dev \
            gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev \
            libx11-dev lib32z-dev ccache libgl1-mesa-dev libxml2-utils xsltproc unzip mtools \
            u-boot-tools scons dkms python2 python-is-python2 libssl-dev bc squashfs-tools openjdk-8-jdk wget python3
          
          # 3. Cai dat Repo Tool ban moi
          mkdir -p /usr/local/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > /usr/local/bin/repo
          chmod a+x /usr/local/bin/repo
          
          # 4. Cau hinh Git kiem soat an toan
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # 5. Dong bo ma nguon tu LineageOS-x86 (Da mo khoa san Signature Spoofing)
          mkdir -p android-x86
          cd android-x86
          repo init -u ${{ env.ROM_URL }} -b ${{ env.ROM_BRANCH }} --no-clone-bundle
          repo sync -c -j4 --force-sync --no-tags
          
          # 6. Nhung truc tiep microG vao source code truoc khi build
          echo "=== Nhung microG vao he thong ==="
          mkdir -p vendor/lineage/prebuilt/common/priv-app/GmsCore
          mkdir -p vendor/lineage/prebuilt/common/priv-app/GsfProxy
          mkdir -p vendor/lineage/prebuilt/common/app/FakeStore

          wget -O vendor/lineage/prebuilt/common/priv-app/GmsCore/GmsCore.apk https://github.com/microg/GmsCore/releases/latest/download/com.google.android.gms.apk
          wget -O vendor/lineage/prebuilt/common/priv-app/GsfProxy/GsfProxy.apk https://github.com/microg/GsfProxy/releases/latest/download/com.google.android.gsf.login.apk
          wget -O vendor/lineage/prebuilt/common/app/FakeStore/FakeStore.apk https://github.com/microg/FakeStore/releases/latest/download/com.android.vending.apk

          # Inject vao file makefile chinh cua LineageOS de nhan dien app he thong
          echo -e "\nPRODUCT_COPY_FILES += \\\\\n  vendor/lineage/prebuilt/common/priv-app/GmsCore/GmsCore.apk:system/priv-app/GmsCore/GmsCore.apk \\\\\n  vendor/lineage/prebuilt/common/priv-app/GsfProxy/GsfProxy.apk:system/priv-app/GsfProxy/GsfProxy.apk \\\\\n  vendor/lineage/prebuilt/common/app/FakeStore/FakeStore.apk:system/app/FakeStore/FakeStore.apk" >> vendor/lineage/config/common.mk

          # 7. Tien hanh build ra file ISO
          . build/envsetup.sh
          lunch lineage_${{ env.DEVICE_NAME }}-userdebug || lunch ${{ env.DEVICE_NAME }}-userdebug
          make -j$(nproc) iso_img
        '

    - name: Check Artifacts
      run: |
        echo "=== Kiem tra file ISO ==="
        ls -lh android-x86/out/target/product/${{ env.DEVICE_NAME }}/*.iso || echo "Khong tim thay file ISO!"

    - name: Upload ISO to GitHub Release
      uses: softprops/action-gh-release@v2
      if: success()
      with:
        tag_name: "LineageOS-15.1-x86-microG-${{ github.run_number }}"
        name: "LineageOS 15.1 PC x86_64 + microG (Build #${{ github.run_number }})"
        body: |
          Bản build sạch chỉnh chu tích hợp sẵn microG hoàn toàn tự động qua Docker.
        files: android-x86/out/target/product/${{ env.DEVICE_NAME }}/*.iso
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
