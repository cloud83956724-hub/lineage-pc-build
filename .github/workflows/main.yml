name: Build LineageOS 16.0 PC (New Driver Compatibility Solution)

on:
  workflow_dispatch:

env:
  ROM_URL: "https://github.com/android-x86/manifest"
  ROM_BRANCH: "lineage-16.0"                        # Đổi sang bản 9.0 để sửa lỗi driver và lỗi 404
  DEVICE_NAME: "android_x86_64"

jobs:
  build:
    runs-on: ubuntu-22.04

    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Free Disk Space & Clean Old Cache
      run: |
        sudo docker image prune --all --force
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        rm -rf android-x86 .repo
        df -h

    - name: Install Android Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git-core gnupg flex bison gperf build-essential zip curl zlib1g-dev \
          gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev \
          libx11-dev lib32z-dev ccache libgl1-mesa-dev libxml2-utils xsltproc unzip mtools \
          u-boot-tools scons dkms bc squashfs-tools python3-pycryptodome python-is-python3

    - name: Install Repo Tool
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/local/bin/repo

    - name: Configure Git Identity
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"

    - name: Initialize with New Branch
      run: |
        mkdir -p android-x86
        cd android-x86
        
        echo "=== Khởi tạo Manifest với nhánh mới ${{ env.ROM_BRANCH }} ==="
        repo init -u ${{ env.ROM_URL }} -b ${{ env.ROM_BRANCH }} --no-clone-bundle --depth=1
        
        # Bẻ lái sang USTC Mirror - Kho này giữ nhánh 16.0 cực chuẩn
        if [ -f ".repo/manifests/default.xml" ]; then
          sed -i 's|fetch="https://android.googlesource.com/"|fetch="https://mirrors.ustc.edu.cn/aosp/"|g' .repo/manifests/default.xml
          sed -i 's|fetch=".."|fetch="https://mirrors.ustc.edu.cn/aosp/"|g' .repo/manifests/default.xml
        fi
        if [ -f ".repo/manifest.xml" ]; then
          sed -i 's|fetch="https://android.googlesource.com/"|fetch="https://mirrors.ustc.edu.cn/aosp/"|g' .repo/manifest.xml
        fi

    - name: Sync Source Code
      run: |
        cd android-x86
        echo "=== Bắt đầu kéo mã nguồn LineageOS 16.0 ==="
        
        # Nhánh mới chạy rất mượt, dùng -j4 tải cho nhanh
        repo sync -c -j4 --force-sync --no-tags --no-clone-bundle --force-broken || true
        repo sync -c -j1 --force-sync --no-tags --no-clone-bundle --force-broken || true
        
        echo "=== Cấu trúc thư mục sau khi sync ==="
        ls -la

    - name: Build LineageOS ISO
      run: |
        cd $GITHUB_WORKSPACE/android-x86
        
        export WITHOUT_CHECK_API=true
        export LC_ALL=C
        
        # Nạp môi trường
        source build/envsetup.sh
        
        echo "=== Chọn cấu hình thiết bị x86_64 ==="
        lunch android_${{ env.DEVICE_NAME }}-userdebug || lunch lineage_${{ env.DEVICE_NAME }}-userdebug || lunch ${{ env.DEVICE_NAME }}-userdebug
        
        echo "=== Tiến hành biên dịch ra file ISO ==="
        make -j$(nproc) iso_img

    - name: Check Artifacts
      run: |
        echo "=== Kiểm tra đầu ra file ISO ==="
        ls -lh android-x86/out/target/product/${{ env.DEVICE_NAME }}/*.iso || ls -lh android-x86/out/target/product/*/*.iso || echo "Khong tim thay file ISO!"

    - name: Upload ISO to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "LineageOS-16-PC-${{ github.run_number }}"
        name: "LineageOS 16.0 PC (Build #${{ github.run_number }})"
        body: |
          Bản build nâng cấp lên LineageOS 16.0 (Android 9.0) để sửa triệt để lỗi driver phần cứng và lỗi thiếu file trên server.
        files: android-x86/out/target/product/${{ env.DEVICE_NAME }}/*.iso
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}