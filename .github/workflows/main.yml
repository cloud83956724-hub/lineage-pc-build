name: Build LineageOS 15.1 x86_64 with MicroG

on:
  workflow_dispatch:  # cho phép chạy thủ công

env:
  BUILD_USERNAME: "github-actions"
  BUILD_HOSTNAME: "github-runner"
  CCACHE_DIR: /home/runner/.ccache
  CCACHE_SIZE: "50G"

jobs:
  build:
    runs-on: [self-hosted, linux, x64]  # hoặc 'ubuntu-latest' nếu dùng larger runner
    steps:
      - name: Checkout repository (chứa script patch & config)
        uses: actions/checkout@v3

      - name: Cài đặt gói dependencies
        run: |
          sudo apt update
          sudo apt install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 libncurses5 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig python3 bc repo

      - name: Cấu hình Git và repo
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          echo "REPO_URL=https://git.osdn.net/gitroot/android-x86/manifest" >> $GITHUB_ENV
          echo "REPO_BRANCH=lineage-15.1-x86" >> $GITHUB_ENV

      - name: Khởi tạo repo và đồng bộ mã nguồn
        run: |
          mkdir -p ~/android/lineage
          cd ~/android/lineage
          repo init -u ${{ env.REPO_URL }} -b ${{ env.REPO_BRANCH }} --depth=1
          repo sync -c --force-sync --no-clone-bundle --no-tags -j$(nproc)

      - name: Áp dụng patch Signature Spoofing cho MicroG
        run: |
          cd ~/android/lineage
          # Lấy patch từ dự án LineageOS for MicroG (ví dụ)
          wget -O sigspoof.patch https://raw.githubusercontent.com/lineageos4microg/docker-lineage-cicd/master/src/signature_spoofing_patches/lineage-15.1.patch
          patch -p1 < sigspoof.patch

      - name: Thêm gói MicroG vào nguồn build
        run: |
          cd ~/android/lineage
          # Tạo thư mục cho prebuilt MicroG
          mkdir -p vendor/microg_prebuilt
          cat > vendor/microg_prebuilt/Android.mk << 'EOF'
          LOCAL_PATH := $(call my-dir)
          include $(CLEAR_VARS)
          LOCAL_MODULE := GmsCore
          LOCAL_MODULE_TAGS := optional
          LOCAL_SRC_FILES := GmsCore.apk
          LOCAL_MODULE_CLASS := APPS
          LOCAL_MODULE_SUFFIX := $(COMMON_ANDROID_PACKAGE_SUFFIX)
          LOCAL_CERTIFICATE := platform
          include $(BUILD_PREBUILT)
          EOF
          # Tải APK MicroG mới nhất
          wget -O vendor/microg_prebuilt/GmsCore.apk https://github.com/microg/GmsCore/releases/latest/download/GmsCore.apk
          # Tương tự với GsfProxy, FakeStore...
          echo "PRODUCT_PACKAGES += GmsCore" >> device/x86/lineage_x86_64/lineage_x86_64.mk

      - name: Thiết lập environment build
        run: |
          cd ~/android/lineage
          source build/envsetup.sh
          lunch lineage_x86_64-eng
          # Tăng dung lượng ccache
          prebuilts/misc/linux-x86/ccache/ccache -M ${{ env.CCACHE_SIZE }}

      - name: Build ROM
        run: |
          cd ~/android/lineage
          mka bacon -j$(nproc)

      - name: Upload artifact (ROM zip)
        uses: actions/upload-artifact@v3
        with:
          name: lineage-15.1-x86_64-microg
          path: ~/android/lineage/out/target/product/x86_64/lineage-15.1-*.zip
          retention-days: 7
