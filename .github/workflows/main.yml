name: Build LineageOS 15.1 PC (GitHub Native Fault-Tolerant Solution)

on:
  workflow_dispatch:

env:
  ROM_URL: "https://github.com/android-x86/manifest"
  DEVICE_NAME: "android_x86_64"

jobs:
  build:
    runs-on: ubuntu-22.04

    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Free Disk Space
      run: |
        sudo docker image prune --all --force
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        df -h

    - name: Install Android Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git-core gnupg flex bison gperf build-essential zip curl zlib1g-dev \
          gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev \
          libx11-dev lib32z-dev ccache libgl1-mesa-dev libxml2-utils xsltproc unzip mtools \
          u-boot-tools scons dkms bc squashfs-tools python3-pycryptodome python-is-python3

    - name: Install Repo Tool
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/local/bin/repo

    - name: Configure Git Identity
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"

    - name: Initialize and Sync Source Code
      run: |
        mkdir -p android-x86
        cd android-x86
        
        # Khởi tạo manifest với cấu hình tối ưu dung lượng
        repo init -u ${{ env.ROM_URL }} --no-clone-bundle --depth=1
        
        echo "=== Bắt đầu vòng lặp Sync thông minh chống nghẽn mạng ==="
        success=false
        # Thử đi thử lại tối đa 5 lần nếu máy chủ từ chối hoặc đứt kết nối
        for i in {1..5}; do
          echo "Nỗ lực đồng bộ lần thứ $i..."
          if [ $i -eq 1 ]; then
            # Lần đầu tiên chạy 4 luồng cho nhanh
            repo sync -c -j4 --force-sync --no-tags --no-clone-bundle && success=true && break
          elif [ $i -eq 2 ]; then
            # Lần 2 hạ xuống 2 luồng để giảm tải chèn ép băng thông
            repo sync -c -j2 --force-sync --no-tags --no-clone-bundle && success=true && break
          else
            # Các lần sau kiên trì tải từng gói một để lượm nốt các gói lỗi (-j1)
            repo sync -c -j1 --force-sync --no-tags --no-clone-bundle --fail-fast && success=true && break
          fi
          echo "Lần sync thứ $i thất bại do nghẽn mạng. Nghỉ 15 giây rồi thử lại..."
          sleep 15
        done

        if [ "$success" = false ]; then
          echo "Đã thử sync 5 lần liên tiếp nhưng máy chủ Git/AOSP vẫn chặn kết nối."
          echo "Vẫn tiếp tục cố đấm ăn xôi chuyển sang bước build xem có vớt vát được gì không..."
        fi
        
        echo "=== Kiểm tra lại thư mục sau khi kết thúc chu kỳ sync ==="
        ls -la

    - name: Build LineageOS ISO
      run: |
        cd android-x86
        export WITHOUT_CHECK_API=true
        export LC_ALL=C
        
        if [ -f "build/envsetup.sh" ]; then
          source build/envsetup.sh
          lunch lineage_${{ env.DEVICE_NAME }}-userdebug || lunch android_${{ env.DEVICE_NAME }}-userdebug || lunch ${{ env.DEVICE_NAME }}-userdebug || lunch lineage_x86_64-userdebug
          make -j$(nproc) iso_img
        else
          echo "Lỗi nghiêm trọng: File build/envsetup.sh vẫn không xuất hiện. Mã nguồn chưa được tải trọn vẹn!"
          exit 1
        fi

    - name: Check Artifacts
      run: |
        echo "=== Kiểm tra đầu ra file ISO ==="
        ls -lh android-x86/out/target/product/${{ env.DEVICE_NAME }}/*.iso || ls -lh android-x86/out/target/product/*/*.iso || echo "Khong tim thay file ISO!"

    - name: Upload ISO to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "LineageOS-PC-CleanBuild-${{ github.run_number }}"
        name: "LineageOS PC (Clean Build) (Build #${{ github.run_number }})"
        body: |
          Bản build sạch (Clean Build), tích hợp cơ chế tự động kết nối lại khi tải mã nguồn (Auto-Retry Loop).
        files: android-x86/out/target/product/${{ env.DEVICE_NAME }}/*.iso
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}